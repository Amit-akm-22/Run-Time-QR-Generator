<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UPI QR Generator</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- React & Babel (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      :root {
        --bg: #121212;
        --card: #1c1c1c;
        --input: #0e0e0e;
        --border: rgba(255, 255, 255, 0.1);
        --text: #ffffff;
        --text-dim: #a0a0a0;
        --accent: #ffffff;
        --radius: 12px;
        --ease: cubic-bezier(0.2, 1, 0.3, 1);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      
      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        height: 100vh;
        height: 100dvh;
        overflow: hidden; /* Single page, no scroll */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      #root { width: 100%; max-width: 440px; }

      .container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        animation: fadeIn 0.6s var(--ease);
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      header { text-align: center; }
      h1 {
        font-family: 'DM Serif Display', serif;
        font-size: 2.2rem;
        letter-spacing: -0.01em;
        margin-bottom: 4px;
      }
      header p {
        font-size: 14px;
        color: var(--text-dim);
        font-weight: 300;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      }

      .form-group { margin-bottom: 16px; }
      label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-dim);
        margin-bottom: 6px;
      }
      
      .input-wrap { position: relative; }
      .prefix {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        color: var(--text-dim);
      }

      input {
        width: 100%;
        background: var(--input);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        color: var(--text);
        font-size: 15px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus { border-color: rgba(255,255,255,0.4); }
      input.has-prefix { padding-left: 32px; font-family: 'JetBrains Mono', monospace; }

      .btn-main {
        width: 100%;
        background: #ffffff;
        color: #000000;
        border: none;
        border-radius: 8px;
        padding: 14px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        transition: transform 0.1s;
        margin-top: 8px;
      }
      .btn-main:active { transform: scale(0.98); }
      .btn-main:disabled { opacity: 0.3; cursor: not-allowed; }

      .qr-result {
        margin-top: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        animation: qrIn 0.5s var(--ease);
      }
      @keyframes qrIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }

      #qr-container {
        background: #ffffff;
        padding: 12px;
        border-radius: 8px;
      }
      #qr-container canvas, #qr-container img { display: block; }

      .qr-details { text-align: center; }
      .qr-id { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); }
      .qr-amt { font-size: 18px; font-weight: 700; margin-top: 2px; }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        width: 100%;
      }
      .btn-sec {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .btn-sec:hover { background: rgba(255,255,255,0.05); }

      footer {
        margin-top: 24px;
        text-align: center;
        font-size: 11px;
        color: var(--text-dim);
      }
      .credit {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(255,255,255,0.03);
        padding: 4px 12px;
        border-radius: 100px;
        border: 1px solid var(--border);
      }
      .heart { color: #ff4b4b; }

      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #ffffff;
        color: #000000;
        padding: 8px 16px;
        border-radius: 100px;
        font-size: 12px;
        font-weight: 600;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        z-index: 1000;
      }

      @media (max-width: 400px) {
        h1 { font-size: 1.8rem; }
        .card { padding: 18px; }
      }

      /* Viewport height adjustments for small screens to stay "one page" */
      @media (max-height: 700px) {
        .container { gap: 12px; }
        header { margin-bottom: 0; }
        h1 { font-size: 1.5rem; }
        .card { padding: 16px; }
        .form-group { margin-bottom: 12px; }
        footer { margin-top: 12px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      function App() {
        const [upiId, setUpiId] = useState('');
        const [payee, setPayee] = useState('');
        const [amount, setAmount] = useState('');
        const [upiLink, setUpiLink] = useState('');
        const [gen, setGen] = useState(false);
        const [toast, setToast] = useState('');
        const qrRef = useRef(null);
        const qrInst = useRef(null);

        useEffect(() => {
          if (window.QRCode) return;
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
          s.async = true;
          document.head.appendChild(s);
        }, []);

        useEffect(() => {
          if (!upiLink || !qrRef.current) return;
          if (qrInst.current) { qrRef.current.innerHTML = ''; qrInst.current = null; }
          qrInst.current = new window.QRCode(qrRef.current, {
            text: upiLink, width: 140, height: 140,
            colorDark: '#000000', colorLight: '#ffffff',
            correctLevel: window.QRCode.CorrectLevel.H
          });
        }, [upiLink]);

        const showToast = (m) => {
          setToast(m);
          setTimeout(() => setToast(''), 2000);
        };

        const handleGen = () => {
          if (!upiId.includes('@')) { showToast('Invalid UPI ID'); return; }
          let link = `upi://pay?pa=${encodeURIComponent(upiId)}`;
          if (payee) link += `&pn=${encodeURIComponent(payee)}`;
          if (amount) link += `&am=${encodeURIComponent(amount)}`;
          link += '&cu=INR';
          setUpiLink(link);
          setGen(true);
        };

        const handleCopy = () => {
          navigator.clipboard.writeText(upiLink);
          showToast('Link copied!');
        };

        const handleDl = () => {
          const canvas = qrRef.current.querySelector('canvas');
          if (!canvas) return;
          const link = document.createElement('a');
          link.download = 'qr.png';
          link.href = canvas.toDataURL();
          link.click();
          showToast('Downloaded!');
        };

        return (
          <div className="container">
            <header>
              <h1>UPI Generator</h1>
              <p>Create payment stickers in seconds</p>
            </header>

            <div className="card">
              <div className="form-group">
                <label>UPI ID</label>
                <input type="text" placeholder="name@upi" value={upiId} onChange={e => setUpiId(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Payee Name</label>
                <input type="text" placeholder="e.g. John Doe" value={payee} onChange={e => setPayee(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Amount (optional)</label>
                <div className="input-wrap">
                  <span className="prefix">₹</span>
                  <input className="has-prefix" type="number" placeholder="0.00" value={amount} onChange={e => setAmount(e.target.value)} />
                </div>
              </div>

              <button className="btn-main" onClick={handleGen} disabled={!upiId}>
                {gen ? 'Update QR' : 'Generate QR Code'}
              </button>

              {gen && (
                <div className="qr-result">
                  <div id="qr-container" ref={qrRef} />
                  <div className="qr-details">
                    <div className="qr-id">{upiId}</div>
                    {amount && <div className="qr-amt">₹ {amount}</div>}
                  </div>
                  <div className="actions">
                    <button className="btn-sec" onClick={handleDl}>Download</button>
                    <button className="btn-sec" onClick={handleCopy}>Copy Link</button>
                  </div>
                </div>
              )}
            </div>

            <footer>
              <div className="credit">
                <span>&gt;_ crafted by <strong>Amit</strong> with <span className="heart">♥</span></span>
              </div>
            </footer>

            {toast && <div className="toast">{toast}</div>}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
