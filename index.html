<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPI QR Generator — Pay Instantly</title>
    <meta name="description" content="Generate a UPI QR code instantly. Enter your UPI ID, name, and amount to create a scannable payment QR code." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- React & Babel (CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      /* ─── CSS Variables ─────────────────────────────────── */
      :root {
        --bg-primary:    #0a0a0a;
        --bg-card:       #111111;
        --bg-input:      #181818;
        --bg-glass:      rgba(255, 255, 255, 0.03);
        --border-subtle: rgba(255, 255, 255, 0.07);
        --border-gold:   #d4a853;
        --text-primary:  #f5f0e8;
        --text-secondary:#a09070;
        --text-muted:    #5a5040;
        --gold:          #d4a853;
        --gold-light:    #f0c96a;
        --gold-dim:      rgba(212, 168, 83, 0.15);
        --gold-glow:     rgba(212, 168, 83, 0.25);
        --error:         #e05f5f;
        --success:       #5db88a;
        --white:         #ffffff;
        --radius-sm:     6px;
        --radius-md:     12px;
        --radius-lg:     20px;
        --radius-xl:     28px;
        --shadow-card:   0 24px 64px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.04);
        --shadow-qr:     0 0 40px rgba(212, 168, 83, 0.12), 0 8px 32px rgba(0,0,0,0.5);
        --transition:    cubic-bezier(0.22, 0.61, 0.36, 1);
      }

      /* ─── Reset & Base ──────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { scroll-behavior: smooth; }

      body {
        background-color: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 36px 16px 80px;
        padding-bottom: max(80px, env(safe-area-inset-bottom) + 24px);
        /* Noise texture overlay */
        background-image:
          radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212,168,83,0.08) 0%, transparent 70%),
          url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      }

      /* ─── Scrollbar ────────────────────────────────────── */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

      /* ─── Layout ────────────────────────────────────────── */
      #root { width: 100%; }

      .app-wrapper {
        max-width: 520px;
        margin: 0 auto;
        width: 100%;
      }

      /* ─── Header ────────────────────────────────────────── */
      .app-header {
        text-align: center;
        margin-bottom: 36px;
      }

      .app-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--gold-dim);
        border: 1px solid rgba(212,168,83,0.3);
        border-radius: 100px;
        padding: 4px 14px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        color: var(--gold);
        text-transform: uppercase;
        margin-bottom: 16px;
      }

      .app-badge-dot {
        width: 6px;
        height: 6px;
        background: var(--gold);
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.8); }
      }

      .app-title {
        font-family: 'DM Serif Display', serif;
        font-size: clamp(2rem, 5vw, 2.75rem);
        font-weight: 400;
        color: var(--text-primary);
        line-height: 1.1;
        letter-spacing: -0.02em;
      }

      .app-title span {
        color: var(--gold);
        font-style: italic;
      }

      .app-subtitle {
        margin-top: 10px;
        font-size: 14px;
        color: var(--text-secondary);
        font-weight: 300;
        letter-spacing: 0.01em;
      }

      /* ─── Card ──────────────────────────────────────────── */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-xl);
        padding: 36px 32px;
        box-shadow: var(--shadow-card);
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(212,168,83,0.4), transparent);
      }

      /* ─── Form ──────────────────────────────────────────── */
      .form-group {
        margin-bottom: 24px;
        position: relative;
      }

      .form-label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }

      .form-label .required {
        color: var(--gold);
        margin-left: 3px;
      }

      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-prefix {
        position: absolute;
        left: 16px;
        font-family: 'DM Mono', monospace;
        font-size: 15px;
        color: var(--gold);
        font-weight: 500;
        pointer-events: none;
        user-select: none;
        z-index: 1;
      }

      .form-input {
        width: 100%;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 14px 16px;
        font-size: 16px; /* 16px prevents iOS auto-zoom on focus */
        color: var(--text-primary);
        font-family: 'Inter', sans-serif;
        outline: none;
        transition: border-color 0.25s var(--transition), box-shadow 0.25s var(--transition), background 0.2s;
        -webkit-appearance: none;
        appearance: none;
        /* Touch-friendly minimum height */
        min-height: 50px;
      }

      .form-input::placeholder {
        color: var(--text-muted);
      }

      .form-input:focus {
        border-color: var(--border-gold);
        box-shadow: 0 0 0 3px var(--gold-dim), 0 0 16px var(--gold-glow);
        background: rgba(212,168,83,0.03);
      }

      .form-input.has-prefix {
        padding-left: 36px;
        font-family: 'DM Mono', monospace;
        font-weight: 400;
        letter-spacing: 0.02em;
      }

      .form-input.input-error {
        border-color: var(--error) !important;
        box-shadow: 0 0 0 3px rgba(224,95,95,0.12) !important;
      }

      /* Remove number input arrows */
      .form-input[type="number"]::-webkit-inner-spin-button,
      .form-input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
      .form-input[type="number"] { -moz-appearance: textfield; }

      .form-error {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-top: 6px;
        font-size: 12px;
        color: var(--error);
        font-weight: 400;
        animation: slideDown 0.2s var(--transition);
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ─── Divider ───────────────────────────────────────── */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 8px 0 28px;
        color: var(--text-muted);
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .divider::before, .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border-subtle);
      }

      /* ─── Generate Button ───────────────────────────────── */
      .btn-generate {
        width: 100%;
        padding: 16px 24px;
        background: linear-gradient(135deg, #d4a853 0%, #b8863a 60%, #d4a853 100%);
        background-size: 200% 200%;
        border: none;
        border-radius: var(--radius-md);
        color: #0a0a0a;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: transform 0.2s var(--transition), box-shadow 0.25s var(--transition), background-position 0.4s;
        box-shadow: 0 4px 24px rgba(212,168,83,0.3), 0 1px 3px rgba(0,0,0,0.5);
      }

      .btn-generate::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
        opacity: 0;
        transition: opacity 0.25s;
      }

      .btn-generate:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(212,168,83,0.45), 0 2px 8px rgba(0,0,0,0.5);
        background-position: right center;
      }

      .btn-generate:hover::before { opacity: 1; }

      .btn-generate:active {
        transform: translateY(0);
        box-shadow: 0 2px 12px rgba(212,168,83,0.25);
      }

      .btn-generate:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .btn-generate-inner {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      /* ─── QR Section ────────────────────────────────────── */
      .qr-section {
        margin-top: 32px;
        animation: fadeSlideUp 0.5s var(--transition) both;
      }

      @keyframes fadeSlideUp {
        from {
          opacity: 0;
          transform: translateY(24px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .qr-card {
        background: #ffffff;
        border-radius: var(--radius-lg);
        padding: 32px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        box-shadow: var(--shadow-qr);
        position: relative;
        width: 100%;
      }

      .qr-card::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: calc(var(--radius-lg) + 1px);
        background: linear-gradient(135deg, rgba(212,168,83,0.5), transparent 50%, rgba(212,168,83,0.3));
        z-index: -1;
      }

      .qr-canvas-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 220px;
        aspect-ratio: 1/1;
        margin: 0 auto;
        position: relative;
      }

      #qr-container canvas,
      #qr-container img {
        width: 100% !important;
        height: 100% !important;
        border-radius: 4px;
        display: block;
      }

      .qr-logo-strip {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        width: 100%;
        text-align: center;
      }

      .qr-payee {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 700;
        color: #111;
        letter-spacing: 0.02em;
      }

      .qr-upi-id {
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        color: #555;
        letter-spacing: 0.04em;
      }

      .qr-amount-badge {
        background: linear-gradient(135deg, #d4a853, #b08030);
        color: #fff;
        padding: 6px 16px;
        border-radius: 100px;
        font-size: 14px;
        font-weight: 700;
        font-family: 'Inter', sans-serif;
        letter-spacing: 0.03em;
        box-shadow: 0 4px 12px rgba(176,128,48,0.25);
        margin-top: 4px;
      }

      /* ─── UPI Link Display ──────────────────────────────── */
      .upi-link-box {
        margin-top: 20px;
        background: var(--bg-input);
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        padding: 12px 16px;
        width: 100%;
      }

      .upi-link-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 6px;
      }

      .upi-link-text {
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        color: var(--gold);
        word-break: break-all;
        line-height: 1.6;
      }

      /* ─── Action Buttons ────────────────────────────────── */
      .action-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 20px;
        width: 100%;
      }

      .btn-action {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 13px 18px;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        cursor: pointer;
        border: 1px solid;
        transition: transform 0.2s var(--transition), box-shadow 0.2s var(--transition), background 0.2s, color 0.2s;
        position: relative;
        overflow: hidden;
      }

      .btn-action::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.06), transparent);
        opacity: 0;
        transition: opacity 0.2s;
      }

      .btn-action:hover::before { opacity: 1; }
      .btn-action:hover { transform: translateY(-2px); }
      .btn-action:active { transform: translateY(0); }

      .btn-download {
        background: var(--gold-dim);
        border-color: rgba(212,168,83,0.4);
        color: var(--gold-light);
        box-shadow: 0 2px 12px rgba(212,168,83,0.1);
      }

      .btn-download:hover {
        background: rgba(212,168,83,0.2);
        box-shadow: 0 4px 20px rgba(212,168,83,0.2);
      }

      .btn-copy {
        background: rgba(255,255,255,0.04);
        border-color: var(--border-subtle);
        color: var(--text-primary);
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      }

      .btn-copy:hover {
        background: rgba(255,255,255,0.07);
        border-color: rgba(255,255,255,0.12);
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      }

      .btn-copy.copied {
        color: var(--success);
        border-color: rgba(93,184,138,0.35);
        background: rgba(93,184,138,0.08);
      }

      /* ─── Toast ─────────────────────────────────────────── */
      .toast-container {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        pointer-events: none;
      }

      .toast {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #1a1a1a;
        border: 1px solid var(--border-subtle);
        border-radius: 100px;
        padding: 12px 22px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-primary);
        box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
        white-space: nowrap;
        animation: toastIn 0.35s var(--transition) both;
      }

      .toast.hide {
        animation: toastOut 0.3s var(--transition) both;
      }

      .toast-icon { font-size: 16px; }

      .toast.success { border-color: rgba(93,184,138,0.3); }
      .toast.error   { border-color: rgba(224,95,95,0.3); }

      @keyframes toastIn {
        from { opacity: 0; transform: translateY(12px) scale(0.95); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes toastOut {
        from { opacity: 1; transform: translateY(0) scale(1); }
        to   { opacity: 0; transform: translateY(8px) scale(0.95); }
      }

      /* ─── Footer ────────────────────────────────────────── */
      .app-footer {
        text-align: center;
        margin-top: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .footer-top {
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 300;
        letter-spacing: 0.04em;
      }

      .footer-top strong { color: var(--text-secondary); font-weight: 500; }

      .footer-credit {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--bg-card);
        border: 1px solid var(--border-subtle);
        border-radius: 100px;
        padding: 6px 16px 6px 10px;
        font-family: 'DM Mono', monospace;
        font-size: 11.5px;
        color: var(--text-secondary);
        letter-spacing: 0.03em;
        transition: border-color 0.2s, color 0.2s;
      }

      .footer-credit:hover {
        border-color: rgba(212,168,83,0.3);
        color: var(--gold);
      }

      .footer-credit-prompt {
        color: var(--gold);
        font-weight: 500;
      }

      .footer-heart {
        display: inline-block;
        color: #e05f5f;
        animation: heartbeat 1.4s ease-in-out infinite;
        font-style: normal;
      }

      @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        14%       { transform: scale(1.25); }
        28%       { transform: scale(1); }
        42%       { transform: scale(1.18); }
        56%       { transform: scale(1); }
      }

      /* ─── Responsive ────────────────────────────────────── */

      /* Tablets / large phones */
      @media (max-width: 600px) {
        body { padding: 24px 12px 72px; }
        .app-header { margin-bottom: 28px; }
        .card { padding: 28px 20px; border-radius: var(--radius-lg); }
        .app-title { font-size: clamp(1.75rem, 7vw, 2.25rem); }
      }

      /* Small phones */
      @media (max-width: 400px) {
        body { padding: 18px 10px 64px; }
        .card { padding: 22px 16px; border-radius: var(--radius-md); }
        .form-input { padding: 12px 14px; min-height: 48px; }
        .form-input.has-prefix { padding-left: 32px; }
        .input-prefix { left: 12px; font-size: 14px; }
        .action-buttons { grid-template-columns: 1fr; gap: 10px; }
        .qr-canvas-wrapper { max-width: 190px; }
        .btn-generate { padding: 14px 20px; font-size: 13px; }
        .qr-card { padding: 24px 16px; gap: 16px; }
        .app-badge { font-size: 10px; padding: 3px 12px; }
      }

      /* Very small (360px) */
      @media (max-width: 360px) {
        .qr-canvas-wrapper { max-width: 170px; }
        .action-buttons { grid-template-columns: 1fr; }
        .btn-action { padding: 12px 14px; font-size: 12px; }
        .upi-link-text { font-size: 11px; }
        .qr-card { padding: 20px 12px; gap: 12px; }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef, useCallback } = React;

      /* ── Prop-type-style constants ──────────────────────── */
      const REQUIRED_FIELD = 'required';
      const OPTIONAL_FIELD = 'optional';

      /* ── Helpers ────────────────────────────────────────── */
      function buildUpiLink({ upiId, payeeName, amount }) {
        let link = `upi://pay?pa=${encodeURIComponent(upiId.trim())}`;
        if (payeeName.trim()) link += `&pn=${encodeURIComponent(payeeName.trim())}`;
        if (amount.trim()) link += `&am=${encodeURIComponent(amount.trim())}`;
        link += '&cu=INR';
        return link;
      }

      function validateUpiId(val) {
        if (!val.trim()) return 'UPI ID is required.';
        if (!val.includes('@')) return 'UPI ID must contain "@" (e.g. name@upi).';
        if (val.trim().split('@').length !== 2 || !val.trim().split('@')[0] || !val.trim().split('@')[1])
          return 'Enter a valid UPI ID in the format name@provider.';
        return '';
      }

      function validateAmount(val) {
        if (!val.trim()) return ''; // optional
        if (isNaN(Number(val)) || !isFinite(Number(val))) return 'Enter a valid number.';
        if (Number(val) < 0) return 'Amount cannot be negative.';
        if (Number(val) === 0) return 'Amount must be greater than ₹0.';
        return '';
      }

      /* ── Icon components ────────────────────────────────── */
      const IconQR = () => (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <path d="M14 14h.01M14 18h.01M18 14h.01M18 18h.01M18 21h.01M21 18h.01M21 14h.01"/>
        </svg>
      );

      const IconDownload = () => (
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      );

      const IconCopy = () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      );

      const IconCheck = () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      );

      /* ── Toast Component ────────────────────────────────── */
      function Toast({ message, type, onDone }) {
        const [hiding, setHiding] = useState(false);

        useEffect(() => {
          const hideTimer = setTimeout(() => setHiding(true), 2400);
          const doneTimer = setTimeout(() => onDone(), 2800);
          return () => { clearTimeout(hideTimer); clearTimeout(doneTimer); };
        }, [onDone]);

        const icons = { success: '✅', error: '❌', info: 'ℹ️' };

        return (
          <div className="toast-container">
            <div className={`toast ${type} ${hiding ? 'hide' : ''}`}>
              <span className="toast-icon">{icons[type] || '💬'}</span>
              {message}
            </div>
          </div>
        );
      }

      /* ── Main App ───────────────────────────────────────── */
      function UpiQRGenerator() {
        const [upiId, setUpiId]       = useState('');
        const [amount, setAmount]     = useState('');
        const [payeeName, setPayeeName] = useState('');

        const [errors, setErrors]     = useState({ upiId: '', amount: '' });
        const [touched, setTouched]   = useState({ upiId: false, amount: false });

        const [upiLink, setUpiLink]   = useState('');
        const [generated, setGenerated] = useState(false);
        const [qrReady, setQrReady]   = useState(false);
        const [qrLibLoaded, setQrLibLoaded] = useState(false);

        const [toast, setToast]       = useState(null);
        const [copied, setCopied]     = useState(false);

        const qrContainerRef = useRef(null);
        const qrInstanceRef  = useRef(null);
        const toastKeyRef    = useRef(0);

        /* Load QRCode.js from CDN */
        useEffect(() => {
          if (window.QRCode) { setQrLibLoaded(true); return; }
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
          script.async = true;
          script.onload = () => setQrLibLoaded(true);
          script.onerror = () => showToast('Failed to load QR library. Check your internet connection.', 'error');
          document.head.appendChild(script);
          return () => { /* leave script in DOM for caching */ };
        }, []);

        /* Generate / update QR whenever upiLink changes */
        useEffect(() => {
          if (!upiLink || !qrLibLoaded || !qrContainerRef.current) return;

          // Destroy old QR instance
          if (qrInstanceRef.current) {
            try { qrInstanceRef.current.clear(); } catch(e) {}
            qrContainerRef.current.innerHTML = '';
            qrInstanceRef.current = null;
          }

          try {
            qrInstanceRef.current = new window.QRCode(qrContainerRef.current, {
              text: upiLink,
              width: 210,
              height: 210,
              colorDark: '#0a0a0a',
              colorLight: '#ffffff',
              correctLevel: window.QRCode.CorrectLevel.H,
            });
            setQrReady(true);
          } catch(e) {
            showToast('Error generating QR code.', 'error');
          }
        }, [upiLink, qrLibLoaded]);

        function showToast(message, type = 'success') {
          toastKeyRef.current += 1;
          setToast({ message, type, key: toastKeyRef.current });
        }

        function validate(fieldName, value) {
          if (fieldName === 'upiId') return validateUpiId(value);
          if (fieldName === 'amount') return validateAmount(value);
          return '';
        }

        function handleBlur(field, value) {
          setTouched(prev => ({ ...prev, [field]: true }));
          setErrors(prev => ({ ...prev, [field]: validate(field, value) }));
        }

        function handleUpiChange(val) {
          setUpiId(val);
          if (touched.upiId) setErrors(prev => ({ ...prev, upiId: validate('upiId', val) }));
        }

        function handleAmountChange(val) {
          // Only allow digits and a single decimal point
          if (val && !/^\d*\.?\d*$/.test(val)) return;
          setAmount(val);
          if (touched.amount) setErrors(prev => ({ ...prev, amount: validate('amount', val) }));
        }

        function handleGenerate() {
          const upiErr    = validateUpiId(upiId);
          const amountErr = validateAmount(amount);
          setTouched({ upiId: true, amount: true });
          setErrors({ upiId: upiErr, amount: amountErr });

          if (upiErr || amountErr) return;

          const link = buildUpiLink({ upiId, payeeName, amount });
          setUpiLink(link);
          setGenerated(true);
          setQrReady(false);
        }

        function handleDownload() {
          if (!qrContainerRef.current) return;
          const canvas = qrContainerRef.current.querySelector('canvas');
          const img    = qrContainerRef.current.querySelector('img');

          if (canvas) {
            // Add white padding around QR
            const size   = canvas.width + 40;
            const offCtx = Object.assign(document.createElement('canvas'), { width: size, height: size }).getContext('2d');
            offCtx.fillStyle = '#ffffff';
            offCtx.fillRect(0, 0, size, size);
            offCtx.drawImage(canvas, 20, 20);
            const link = document.createElement('a');
            link.download = `upi-qr-${upiId.replace(/[^a-z0-9]/gi, '_')}.png`;
            link.href = offCtx.canvas.toDataURL('image/png');
            link.click();
          } else if (img) {
            const a = document.createElement('a');
            a.download = `upi-qr-${upiId.replace(/[^a-z0-9]/gi, '_')}.png`;
            a.href = img.src;
            a.click();
          }
          showToast('QR image downloaded!', 'success');
        }

        async function handleCopy() {
          try {
            await navigator.clipboard.writeText(upiLink);
            setCopied(true);
            showToast('UPI link copied to clipboard!', 'success');
            setTimeout(() => setCopied(false), 2500);
          } catch {
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = upiLink;
            ta.style.cssText = 'position:fixed;opacity:0;';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            setCopied(true);
            showToast('UPI link copied!', 'success');
            setTimeout(() => setCopied(false), 2500);
          }
        }

        /* ── Derived UI state ─────────────────────────────── */
        const hasUpiError    = touched.upiId   && errors.upiId;
        const hasAmountError = touched.amount  && errors.amount;
        const canGenerate    = !!(upiId.trim());

        return (
          <>
            <div className="app-wrapper">
              {/* Header */}
              <header className="app-header">
                <div className="app-badge">
                  <span className="app-badge-dot" />
                  Run-Time QR
                </div>
                <h1 className="app-title">
                  UPI <span>QR</span> Generator
                </h1>
                <p className="app-subtitle">Craft a scannable payment QR code in seconds</p>
              </header>

              {/* Main Card */}
              <div className="card">
                {/* UPI ID */}
                <div className="form-group">
                  <label className="form-label" htmlFor="upi-id">
                    UPI ID <span className="required">*</span>
                  </label>
                  <div className="input-wrapper">
                    <input
                      id="upi-id"
                      type="text"
                      className={`form-input has-prefix${hasUpiError ? ' input-error' : ''}`}
                      placeholder="yourname@upi"
                      value={upiId}
                      onChange={e => handleUpiChange(e.target.value)}
                      onBlur={e => handleBlur('upiId', e.target.value)}
                      autoComplete="off"
                      spellCheck="false"
                    />
                  </div>
                  {hasUpiError && (
                    <span className="form-error" role="alert">
                      ⚠ {errors.upiId}
                    </span>
                  )}
                </div>

                {/* Payee Name */}
                <div className="form-group">
                  <label className="form-label" htmlFor="payee-name">
                    Payee Name <span style={{color:'var(--text-muted)', fontStyle:'italic', marginLeft:4}}>optional</span>
                  </label>
                  <div className="input-wrapper">
                    <input
                      id="payee-name"
                      type="text"
                      className="form-input"
                      placeholder="e.g. Raj Sharma"
                      value={payeeName}
                      onChange={e => setPayeeName(e.target.value)}
                      autoComplete="off"
                    />
                  </div>
                </div>

                {/* Amount */}
                <div className="form-group" style={{marginBottom: 0}}>
                  <label className="form-label" htmlFor="amount">
                    Amount (₹) <span style={{color:'var(--text-muted)', fontStyle:'italic', marginLeft:4}}>optional</span>
                  </label>
                  <div className="input-wrapper">
                    <span className="input-prefix">₹</span>
                    <input
                      id="amount"
                      type="number"
                      className={`form-input has-prefix${hasAmountError ? ' input-error' : ''}`}
                      placeholder="0.00"
                      value={amount}
                      onChange={e => handleAmountChange(e.target.value)}
                      onBlur={e => handleBlur('amount', e.target.value)}
                      min="0"
                      step="0.01"
                    />
                  </div>
                  {hasAmountError && (
                    <span className="form-error" role="alert">
                      ⚠ {errors.amount}
                    </span>
                  )}
                </div>

                <div className="divider" style={{marginTop: 28}}>
                  <span>Generate</span>
                </div>

                {/* Generate Button */}
                <button
                  id="btn-generate-qr"
                  className="btn-generate"
                  onClick={handleGenerate}
                  disabled={!canGenerate}
                >
                  <span className="btn-generate-inner">
                    <IconQR />
                    {generated ? 'Regenerate QR Code' : 'Generate QR Code'}
                  </span>
                </button>

                {/* QR Section */}
                {generated && (
                  <div className="qr-section" key={upiLink}>
                    {/* QR Card */}
                    <div className="qr-card">
                      <div className="qr-canvas-wrapper">
                        <div id="qr-container" ref={qrContainerRef} />
                      </div>

                      <div className="qr-logo-strip">
                        {payeeName && <div className="qr-payee">{payeeName}</div>}
                        <div className="qr-upi-id">{upiId}</div>
                        {amount && (
                          <div className="qr-amount-badge">₹ {parseFloat(amount).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
                        )}
                      </div>

                      {/* Scan hint */}
                      <p style={{fontSize:11, color:'#777', letterSpacing:'0.04em', fontFamily:'Inter, sans-serif'}}>
                        📱 Scan with any UPI app to pay
                      </p>
                    </div>

                    {/* UPI Link Box */}
                    <div className="upi-link-box">
                      <div className="upi-link-label">UPI Deep Link</div>
                      <div className="upi-link-text">{upiLink}</div>
                    </div>

                    {/* Action Buttons */}
                    <div className="action-buttons">
                      <button
                        id="btn-download-qr"
                        className="btn-action btn-download"
                        onClick={handleDownload}
                      >
                        <IconDownload /> Download PNG
                      </button>

                      <button
                        id="btn-copy-link"
                        className={`btn-action btn-copy${copied ? ' copied' : ''}`}
                        onClick={handleCopy}
                      >
                        {copied ? <IconCheck /> : <IconCopy />}
                        {copied ? 'Copied!' : 'Copy UPI Link'}
                      </button>
                    </div>
                  </div>
                )}
              </div>

              <footer className="app-footer">
                <div className="footer-top">
                  Powered by <strong>QRCode.js</strong> &amp; <strong>UPI Protocol</strong> · Runs entirely in your browser
                </div>
                <div className="footer-credit">
                  <span className="footer-credit-prompt">&gt;_</span>
                  crafted by <strong style={{color:'var(--text-primary)', fontWeight:600}}>Amit</strong>
                  &nbsp;with&nbsp;
                  <em className="footer-heart">♥</em>
                  &nbsp;// v1.0.0
                </div>
              </footer>
            </div>

            {/* Toast */}
            {toast && (
              <Toast
                key={toast.key}
                message={toast.message}
                type={toast.type}
                onDone={() => setToast(null)}
              />
            )}
          </>
        );
      }

      /* ── Mount ────────────────────────────────────────────── */
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<UpiQRGenerator />);
    </script>
  </body>
</html>
